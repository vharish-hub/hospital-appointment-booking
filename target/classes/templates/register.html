<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-10">
            <div class="glass-card p-5 shadow-lg border-0">
                <div class="text-center mb-4">
                    <div class="text-primary fs-1 mb-2"><i class="fa-solid fa-user-plus"></i></div>
                    <h3 class="fw-bold">Patient Registration</h3>
                    <p class="text-muted">Create an account to book and track doctor consultations</p>
                </div>
                
                <form id="registerForm" class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="john.doe@gmail.com" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" placeholder="+1 (555) 019-2834" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Gender</label>
                        <select id="gender" class="form-select" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Date of Birth</label>
                        <input type="date" id="dob" class="form-control" required>
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label fw-semibold">Residential Address</label>
                        <input type="text" id="address" class="form-control" placeholder="123 Main St, Springfield" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="col-12 mt-4">
                        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 rounded-3 fw-bold shadow-sm">
                            <span id="spinner" class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                            Register Account
                        </button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <span class="text-muted">Already have an account?</span>
                    <a th:href="@{/login}" class="text-decoration-none fw-semibold">Login here</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script>
    document.getElementById("registerForm").addEventListener("submit", function(event) {
        event.preventDefault();
        
        const fullName = document.getElementById("fullName").value;
        const email = document.getElementById("email").value;
        const phone = document.getElementById("phone").value;
        const gender = document.getElementById("gender").value;
        const dob = document.getElementById("dob").value;
        const address = document.getElementById("address").value;
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        
        if (password !== confirmPassword) {
            Swal.fire({
                icon: 'error',
                title: 'Validation Error',
                text: 'Passwords do not match'
            });
            return;
        }

        const submitBtn = document.getElementById("submitBtn");
        const spinner = document.getElementById("spinner");
        
        submitBtn.disabled = true;
        spinner.classList.remove("d-none");
        
        fetch('/api/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ fullName, email, phone, gender, dob, address, password, confirmPassword })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw new Error(err.error || 'Registration failed') });
            }
            return response.json();
        })
        .then(data => {
            Swal.fire({
                icon: 'success',
                title: 'Registration Successful',
                text: 'Your patient account has been created. Please log in.',
                confirmButtonColor: '#0284c7'
            }).then(() => {
                window.location.href = '/login';
            });
        })
        .catch(error => {
            submitBtn.disabled = false;
            spinner.classList.add("d-none");
            Swal.fire({
                icon: 'error',
                title: 'Registration Failed',
                text: error.message
            });
        });
    });
</script>
</body>
</html>
