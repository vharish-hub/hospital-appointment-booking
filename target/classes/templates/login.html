<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center my-5">
        <div class="col-lg-5 col-md-8">
            <div class="glass-card p-5 shadow-lg border-0">
                <div class="text-center mb-4">
                    <div class="text-primary fs-1 mb-2"><i class="fa-solid fa-heart-pulse"></i></div>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted">Sign in to manage your appointments</p>
                </div>
                
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                            <input type="email" id="email" class="form-control border-start-0" placeholder="name@domain.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label class="form-label fw-semibold">Password</label>
                            <a href="#" onclick="forgotPassword()" class="text-decoration-none small">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" id="password" class="form-control border-start-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-3 rounded-3 fw-bold mb-3 shadow-sm">
                        <span id="spinner" class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                        Sign In
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <span class="text-muted">Don't have an account?</span>
                    <a th:href="@{/register}" class="text-decoration-none fw-semibold">Register here</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(event) {
        event.preventDefault();
        
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        
        const submitBtn = document.getElementById("submitBtn");
        const spinner = document.getElementById("spinner");
        
        submitBtn.disabled = true;
        spinner.classList.remove("d-none");
        
        fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
        })
        .then(response => {
            if (!response.ok) {
                return response.json().then(err => { throw new Error(err.error || 'Login failed') });
            }
            return response.json();
        })
        .then(data => {
            // Save token to localStorage (optional for REST headers, cookies are used for views)
            localStorage.setItem("jwt_token", data.token);
            
            Swal.fire({
                icon: 'success',
                title: 'Login Successful',
                text: `Welcome back, ${data.fullName}!`,
                showConfirmButton: false,
                timer: 1500
            }).then(() => {
                // Redirect depending on user role
                if (data.role === 'ADMIN') {
                    window.location.href = '/admin/dashboard';
                } else if (data.role === 'DOCTOR') {
                    window.location.href = '/doctor/dashboard';
                } else {
                    window.location.href = '/patient/dashboard';
                }
            });
        })
        .catch(error => {
            submitBtn.disabled = false;
            spinner.classList.add("d-none");
            Swal.fire({
                icon: 'error',
                title: 'Authentication Failed',
                text: error.message
            });
        });
    });

    function forgotPassword() {
        Swal.fire({
            title: 'Forgot Password',
            input: 'email',
            inputLabel: 'Enter your email address',
            inputPlaceholder: 'name@domain.com',
            showCancelButton: true,
            confirmButtonColor: '#0284c7',
            confirmButtonText: 'Reset Password',
            preConfirm: (email) => {
                if (!email) {
                    Swal.showValidationMessage('Please enter a valid email address');
                    return;
                }
                return fetch(`/api/auth/forgot-password?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .catch(() => {
                    Swal.showValidationMessage('Request failed');
                });
            }
        }).then((result) => {
            if (result.isConfirmed) {
                Swal.fire({
                    icon: 'success',
                    title: 'Email Sent',
                    text: result.value.message
                });
            }
        });
    }
</script>
</body>
</html>
