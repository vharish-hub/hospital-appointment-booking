<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contact Us')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container py-5">
    <div class="text-center mb-5">
        <h2 class="fw-bold">Contact MediCare Hospital</h2>
        <p class="text-muted">Our desk is available 24/7 for support and emergency hotlines.</p>
    </div>
    <div class="row g-5">
        <div class="col-lg-5">
            <div class="glass-card p-5 border-0 shadow-sm">
                <h4 class="fw-bold mb-4">Contact Information</h4>
                <div class="d-flex align-items-center gap-3 mb-3">
                    <i class="fa-solid fa-map-location-dot text-primary fa-2x"></i>
                    <div>
                        <h6 class="fw-bold mb-0">Location</h6>
                        <p class="text-muted small mb-0">123 Health Ave, Medical City</p>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-3 mb-3">
                    <i class="fa-solid fa-phone-volume text-primary fa-2x"></i>
                    <div>
                        <h6 class="fw-bold mb-0">Phone Lines</h6>
                        <p class="text-muted small mb-0">+1 (234) 567-890</p>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <i class="fa-solid fa-envelope text-primary fa-2x"></i>
                    <div>
                        <h6 class="fw-bold mb-0">Support Email</h6>
                        <p class="text-muted small mb-0">support@medicare.com</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-7">
            <div class="glass-card p-5 border-0 shadow-sm">
                <h4 class="fw-bold mb-4">Send a Message</h4>
                <form onsubmit="Swal.fire('Message Sent', 'We will get back to you shortly.', 'success'); return false;" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Your Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Your Email</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label small fw-semibold">Subject</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="col-md-12">
                        <label class="form-label small fw-semibold">Message</label>
                        <textarea class="form-control" rows="4" required></textarea>
                    </div>
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary px-4 py-2 fw-semibold">Send Message</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
