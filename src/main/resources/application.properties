# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8081

# ==========================================
# DATASOURCE CONFIGURATION (H2 - Default)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:medicaredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# JPA & HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# SQL INITIALIZATION
# ==========================================
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:always}
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ==========================================
# THYMELEAF CONFIGURATION
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

# ==========================================
# JWT CONFIGURATION
# ==========================================
medicare.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
medicare.jwt.expiration-ms=86400000

# ==========================================
# SPRING MAIL CONFIGURATION (Mocked by default)
# ==========================================
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test@medicare.com
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ==========================================
# MULTIPART (FILE UPLOAD) CONFIGURATION
# ==========================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

